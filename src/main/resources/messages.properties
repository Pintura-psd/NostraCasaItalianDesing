# Index
presentation.title1=Bienvenido a
presentation.title2=Nostra Casa Italian Desing
presentation.text=Nostra Casa Italian Design es una empresa establecida en Castell\u00F3n, Espa\u00F1a, fundada en 2026 con una l\u00EDnea de trabajo clara: redefinir el dise\u00F1o cer\u00E1mico a trav\u00E9s de la sofisticaci\u00F3n y la exclusividad.\n\nA pesar de nuestra reciente creaci\u00F3n, estamos comprometidos con la calidad, la innovaci\u00F3n y una est\u00E9tica refinada. Nos especializamos en productos cer\u00E1micos de alta gama, creando soluciones elegantes y duraderas, pensadas tanto para espacios residenciales como comerciales.\n\nNuestro objetivo es ir m\u00E1s all\u00E1 del simple uso de materiales, creando espacios donde el dise\u00F1o y el lujo se unen.

