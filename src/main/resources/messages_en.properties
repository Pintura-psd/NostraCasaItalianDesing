category.carrusel1=An exotic style of vibrant purples with subtle black veining and soft brown tones.
category.carrusel2=Blues and blacks combined. Patterns reminiscent of marshlands and shallow waters. Subtle plays of form that create the depth of light as it passes through the water's surface.
category.carrusel3=Greys with glossy finishes. Soft grey gradients that, together with the polished finish of our ceramics, create a refined and elegant silver-toned atmosphere.

