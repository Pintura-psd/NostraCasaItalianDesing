presentation.title1=Welcome to
presentation.title2=Nostra Casa Italian Design
presentation.text=Nostra Casa Italian Desing, is a company based in Castell\u00F3n, Spain, founded in 2026 with a clear vision: to redefine ceramic design through sophistication and luxury. Despite being newly established, we are committed to quality, innovation, and refined aesthetics. We specialize in high-end ceramic products, creating elegant and durable solutions that enhance both residential and commercial spaces. Our goal is to go beyond materials, delivering environments where design and luxury meet.

