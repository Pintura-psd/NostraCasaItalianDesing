<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Contact</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://kit.fontawesome.com/4d6bf4659f.js" crossorigin="anonymous"></script>
    <link th:href="@{/stylesCSS/footerStyle.css}" rel="stylesheet">
    <link th:href="@{/stylesCSS/navbarStyle.css}" rel="stylesheet">
</head>
<body>
<div th:replace="navbar :: copy"></div>

<div id="section1" class="container-fluid px-5 px-lg-custom mt-3">

    <h1>Contacto: </h1>

    <div class="row mt-5 mb-4 justify-content-center">
        <div class="col-6 col-lg-5 col-xl-4 mt-5 mb-2">
            <div class="rounded container-fluid mt-1"
                 style="background-color: #ececec; border: 2px solid black; padding: 20px;">
                <h3>Contacta con nosotros</h3>
                <br>

                <form th:action="@{/contact}" th:object="${messageDTO}" method="post">

                    <div class="mb-3">
                        <label for="name" class="form-label">Nombre:</label>
                        <input
                                type="name"
                                th:field="*{name}"
                                class="form-control"
                                id="name"
                                placeholder="Nombre">
                    </div>

                    <div class="mb-3">
                        <label for="email" class="form-label">Email:</label>
                        <input
                                type="email"
                                th:field="*{email}"
                                class="form-control"
                                id="email"
                                aria-describedby="emailHelp"
                                placeholder="Email">
                        <div id="emailHelp" class="form-text">
                            No compartiremos su email con nadie.
                        </div>
                    </div>

                    <div class="mb-3">
                        <label for="subject" class="form-label">Asunto:</label>
                        <input
                                type="subject"
                                th:field="*{subject}"
                                class="form-control"
                                id="subject"
                                placeholder="Asunto">
                    </div>

                    <div class="mb-3">
                        <label for="phone" class="form-label">Teléfono:</label>
                        <input
                                type="phone"
                                th:field="*{phone}"
                                class="form-control"
                                id="phone"
                                aria-describedby="phoneHelp"
                                placeholder="Email">
                        <div id="phoneHelp" class="form-text">
                            No compartiremos su teléfono con nadie.
                        </div>
                    </div>

                    <div class="mb-3">
                        <label for="messageText" class="form-label">Mensaje:</label>
                        <textarea
                                th:field="*{messageText}"
                                class="form-control"
                                id="messageText"
                                rows="5"
                                placeholder="Escribe tu mensaje aquí..."></textarea>
                    </div>

                    <button type="submit" class="btn btn-dark">Enviar</button>
                </form>
            </div>
        </div>

        <div class="col-6 col-lg-5 col-xl-4 mt-5 mb-4">
            <div class="rounded container-fluid mt-1 d-flex flex-column"
                 style="background-color: #ececec; border: 2px solid black; padding: 20px; height: 400px;">
                <h3>Nos puedes encontrar aquí:</h3>
                <div class="rounded container-fluid mt-1 flex-grow-1"
                     style="border: 2px solid black; padding: 3px;">
                            <iframe
                                    src="https://www.google.com/maps?q=Madrid&output=embed"
                                    width="100%"
                                    height="100%"
                                    style="border:0;"
                                    loading="lazy">
                            </iframe>
                        </div>
            </div>
        </div>

    </div>


</div>
<div th:replace="footer :: copy"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
