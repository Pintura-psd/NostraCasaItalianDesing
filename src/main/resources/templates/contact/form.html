<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="#{contact.title}">Contact</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <script src="https://kit.fontawesome.com/4d6bf4659f.js" crossorigin="anonymous"></script>

    <link th:href="@{/stylesCSS/contactStyle.css}" rel="stylesheet">
    <link th:href="@{/stylesCSS/footerStyle.css}" rel="stylesheet">
    <link th:href="@{/stylesCSS/navbarCustomStyle.css}" rel="stylesheet">
</head>

<body>

<div th:replace="navbarCustom :: copy"></div>

<div id="section1" class="container-fluid px-lg-custom mt-3">

    <h1 class="mt-5" th:text="#{contact.title}">
        Contacto:
    </h1>

    <div th:if="${successMessage}"
         class="alert alert-success alert-dismissible fade show"
         role="alert">

        <span th:text="${successMessage}"></span>

        <button type="button"
                class="btn-close"
                data-bs-dismiss="alert">
        </button>
    </div>

    <div class="row mt-5 mb-4 justify-content-center g-4">

        <!-- FORM -->
        <div class="col-12 col-md-10 col-lg-5 col-xl-4">

            <div class="contact-box">

                <h3 th:text="#{contact.heading}">
                    Contacta con nosotros
                </h3>

                <br>

                <div th:if="${errorMessage}"
                     class="alert alert-danger alert-dismissible fade show"
                     role="alert">

                    <span th:text="${errorMessage}"></span>

                    <button type="button"
                            class="btn-close"
                            data-bs-dismiss="alert">
                    </button>
                </div>

                <form th:action="@{/contact}"
                      th:object="${messageDTO}"
                      method="post">

                    <div class="mb-3">
                        <label for="name"
                               class="form-label"
                               th:text="#{contact.name}">
                            Nombre:
                        </label>

                        <input type="text"
                               th:field="*{name}"
                               class="form-control"
                               id="name"
                               th:placeholder="#{contact.namePlaceHolder}">
                    </div>

                    <div class="mb-3">
                        <label for="email"
                               class="form-label"
                               th:text="#{contact.email}">
                            Email:
                        </label>

                        <input type="email"
                               th:field="*{email}"
                               class="form-control"
                               id="email"
                               placeholder="Email">

                        <div id="emailHelp"
                             class="form-text"
                             th:text="#{contact.emailHelp}">
                        </div>
                    </div>

                    <div class="mb-3">
                        <label for="subject"
                               class="form-label"
                               th:text="#{contact.subject}">
                            Asunto:
                        </label>

                        <input type="text"
                               th:field="*{subject}"
                               class="form-control"
                               id="subject"
                               th:placeholder="#{contact.subjectPlaceHolder}">
                    </div>

                    <div class="mb-3">
                        <label for="phone"
                               class="form-label"
                               th:text="#{contact.phone}">
                            Teléfono:
                        </label>

                        <input type="text"
                               th:field="*{phone}"
                               class="form-control"
                               id="phone"
                               th:placeholder="#{contact.phonePlaceHolder}">

                        <div id="phoneHelp"
                             class="form-text"
                             th:text="#{contact.phoneHelp}">
                        </div>
                    </div>

                    <div class="mb-3">
                        <label for="messageText"
                               class="form-label"
                               th:text="#{contact.message}">
                            Mensaje:
                        </label>

                        <textarea th:field="*{messageText}"
                                  class="form-control"
                                  id="messageText"
                                  rows="5"
                                  th:placeholder="#{contact.messagePlaceholder}">
                        </textarea>
                    </div>

                    <button type="submit"
                            id="submitBtn"
                            class="btn btn-dark">
                        <span id="btnText" th:text="#{contact.submit}"></span>

                        <span id="spinner"
                              class="spinner-border spinner-border-sm d-none"
                              role="status"
                              aria-hidden="true">
                        </span>
                    </button>

                </form>

            </div>

        </div>

        <!-- MAP -->
        <div class="col-12 col-md-10 col-lg-5 col-xl-4">

            <div class="contact-box map-box">

                <h3 th:text="#{contact.mapHeading}">
                    Nos puedes encontrar aquí:
                </h3>

                <div class="map-container">

                    <iframe src="https://www.google.com/maps?q=Castellon&output=embed"
                            loading="lazy">
                    </iframe>

                </div>

            </div>

        </div>

    </div>

    <!-- DISCLAIMER -->
    <div id="section2"
         class="rounded container-fluid px-lg-custom py-5 disclaimer-box">

        <div class="row justify-content-center text-center">

            <div class="col-12">

                <h2 class="mb-3"
                    th:text="#{disclamer.important}">
                </h2>

                <p class="fs-5 mb-2"
                   th:text="#{disclamer.text}">
                </p>

                <h4 class="fw-bold">
                    <a href="mailto:info@nostracasaitaliandesing.com"
                       class="email-link">
                        info@nostracasaitaliandesing.com
                    </a>
                </h4>

            </div>

        </div>

    </div>

</div>

<div th:replace="footer :: copy"></div>

<script src="/js/navbarCustom.js"></script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

<script>
    document.addEventListener("DOMContentLoaded", function () {

        const form = document.querySelector("form");
        const btn = document.getElementById("submitBtn");
        const spinner = document.getElementById("spinner");

        form.addEventListener("submit", function () {

            // Evita doble click
            btn.disabled = true;

            // Muestra spinner
            spinner.classList.remove("d-none");
        });

    });
</script>

</body>
</html>
