<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Footer</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://kit.fontawesome.com/4d6bf4659f.js" crossorigin="anonymous"></script>
    <link th:href="@{/stylesCSS/footerStyle.css}" rel="stylesheet">
</head>
<body>
<div th:fragment="copy">
    <div class="bg-dark mt-5">
        <div class="container-fluid py-5" style="padding-left: 100px; padding-right: 100px;">
            <div class="row">
                <div class="col">
                    <h2>
                            <img th:src="@{/logos/nostracasa_logo_dark.svg}" alt="Logo" style="height:50px; width:auto;">
                    </h2>
                </div>

                <div class="col">
                    <h2>
                        <a class="footer-link "
                           th:classappend="${selectedPage == 'home'} ? ' active'"
                           th:attr="aria-current=${selectedPage == 'home'} ? 'page' : null"
                           th:href="@{/category}">Categorías
                        </a>
                    </h2>
                    <ul>
                        <li th:each="category : ${categories}">
                            <h3>
                                <a class="footer-li"
                                   th:href="@{/category/{id}/products(id=${category.id})}"
                                   th:classappend="${category.id == selectedCategoryId} ? ' active'"
                                   th:attr="aria-current=${category.id == selectedCategoryId} ? 'page' : null"
                                   th:text="${category.description}">
                                </a>
                            </h3>
                        </li>
                    </ul>

                </div>
                <div class="col">
                    <h2>
                        <a class="footer-link "
                           th:classappend="${selectedPage == 'home'} ? ' active'"
                           th:attr="aria-current=${selectedPage == 'home'} ? 'page' : null"
                           th:href="@{/contact}">Contacto
                        </a>
                    </h2>
                </div>
                <div class="col">
                    <h2 style="color: white">Ubicación</h2>

                    <h2 style="color: #d3d3d3">
                        B26575381
                        NOSTRACASA ITALIAN DESIGNE SL
                        B26575381 Pz. Pedro Coronel 2,
                        6 PTa C  12550 Almazora (Castellón)
                    </h2>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
