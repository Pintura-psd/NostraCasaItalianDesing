<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Nostra Casa</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://kit.fontawesome.com/4d6bf4659f.js" crossorigin="anonymous"></script>
    <link th:href="@{/stylesCSS/indexStyle.css}" rel="stylesheet">
    <link th:href="@{/stylesCSS/footerStyle.css}" rel="stylesheet">
    <link th:href="@{/stylesCSS/navbarCustomStyle.css}" rel="stylesheet">

</head>
<body>
<div th:replace="navbarCustom :: copy"></div>

<div id="carouselAutoplaying" class="carousel slide carousel-fade" data-bs-ride="carousel" data-bs-interval="3000"  data-bs-pause="false">

    <div class="carousel-indicators">
        <button type="button" data-bs-target="#carouselAutoplaying" data-bs-slide-to="0" class="active"></button>
        <button type="button" data-bs-target="#carouselAutoplaying" data-bs-slide-to="1"></button>
        <button type="button" data-bs-target="#carouselAutoplaying" data-bs-slide-to="2"></button>
    </div>

    <div class="carousel-inner">
        <div class="carousel-item active">
            <img th:src="@{/inicio_images/fotos_carrusel/carrusel0.png}" class="d-block w-100" alt="Imagen carrusel 1">
        </div>
        <div class="carousel-item">
            <img th:src="@{/inicio_images/fotos_carrusel/carrusel1.png}" class="d-block w-100" alt="Imagen carrusel 2">
        </div>
        <div class="carousel-item">
            <img th:src="@{/inicio_images/fotos_carrusel/carrusel2.png}" class="d-block w-100" alt="Imagen carrusel 3">
        </div>
    </div>
</div>

<div id="section1" class="container-fluid px-5 px-lg-custom">

        <section class="row bg-pealwhite" style="min-height: 300px;">

            <div class="col-12 col-md-6">
                <img th:src="@{/inicio_images/presentation.png}"
                     class="rounded d-block w-100"
                     alt="Imagen carrusel 3">
            </div>

            <div class="col-12 col-md-6">
                <h1 style="font-weight: 300;" th:text="#{presentation.title1}"></h1>
                <h1><strong th:text="#{presentation.title2}"></strong></h1>
                <p th:text="#{presentation.text}"></p>
            </div>
        </section>
</div>

<div id="section2" class="container-fluid px-5 px-lg-custom">
    <section class="row" style="min-height: 300px; padding-top: 50px;">

        <div class="container px-custom" style="padding-top:50px;">

            <div id="carouselCards" class="carousel slide">

                <div id="carrusel2-indicators" class="carousel-indicators">
                    <button type="button" data-bs-target="#carouselCards" data-bs-slide-to="0" class="active"></button>
                    <button type="button" data-bs-target="#carouselCards" data-bs-slide-to="1"></button>
                </div>

                <!-- Carousel inner -->
                <div class="carousel-inner">

                    <!-- Slide 1 -->
                    <div class="carousel-item active">
                        <div class="row g-4 justify-content-center">

                            <div class="col-12 col-md-4">
                                <div class="rounded card">
                                    <img th:src="@{/inicio_images/fotos_cards/card1.png}" class="card-img-top" alt="Card 1">
                                    <div class="card-body">
                                        <h2 class="card-text">Pure Gold</h2>
                                    </div>
                                </div>
                            </div>

                            <div class="col-12 col-md-4">
                                <div class="rounded card">
                                    <img th:src="@{/inicio_images/fotos_cards/card2.png}" class="card-img-top" alt="Card 2">
                                    <div class="card-body">
                                        <h2 class="card-text">Artstone</h2>
                                    </div>
                                </div>
                            </div>

                            <div class="col-12 col-md-4">
                                <div class="rounded card">
                                    <img th:src="@{/inicio_images/fotos_cards/card3.png}" class="card-img-top" alt="Card 3">
                                    <div class="card-body">
                                        <h2 class="card-text">Marble</h2>
                                    </div>
                                </div>
                            </div>

                        </div>
                    </div>

                    <!-- Slide 2 -->
                    <div class="carousel-item">
                        <div class="row g-4 justify-content-center">

                            <div class="col-12 col-md-4">
                                <div class="rounded card">
                                    <img th:src="@{/inicio_images/fotos_cards/card4.png}" class="card-img-top" alt="Card 4">
                                    <div class="card-body">
                                        <h2 class="card-text">Stone</h2>
                                    </div>
                                </div>
                            </div>

<!--                            <a class="btn btn-primary" href="/category" role="button">Consulta nuestro catálogo</a>-->

                        </div>
                    </div>
                </div>

            </div>
        </div>

    </section>

</div>
<div th:replace="footer :: copy"></div>
<script src="/js/navbarCustom.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
