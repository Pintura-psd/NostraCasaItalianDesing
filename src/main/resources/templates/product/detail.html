<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${product.getName(#locale.language)}">Product Name</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://kit.fontawesome.com/4d6bf4659f.js" crossorigin="anonymous"></script>
    <link th:href="@{/stylesCSS/footerStyle.css}" rel="stylesheet">
    <link th:href="@{/stylesCSS/navbarCustomStyle.css}" rel="stylesheet">
</head>
<body>
<div th:replace="navbarCustom :: copy"></div>

<div class="row justify-content-center">

    <div class="col-12 col-lg-10 col-xl-8">

        <div class="d-flex justify-content-center mt-4">
            <img th:src="@{${product.thumbnail}}" class="img-fluid rounded" alt="Imagen del producto">
        </div>

        <h1 th:text="${product.getName(#locale.language)}"></h1>

    </div>

    <div class="row justify-content-center mt-4">
        <div class="col-6 col-lg-5 col-xl-4">
            <div class="rounded px-5 py-3" style="background-color:#c5c5c5;">
                <p>
                    <span th:text="#{product.thickness} + ':'"></span>
                    <br>
                    <strong th:text="${product.thickness}"></strong>
                </p>

                <p>
                    <span th:text="#{product.finishes} + ':'"></span>
                    <br>
                    <strong th:text="${product.finishes}"></strong>
                </p>

                <p>
                    <span th:text="#{product.size} + ':'"></span>
                    <br>
                    <strong th:text="${product.size}"></strong>
                </p>
            </div>
        </div>

        <div class="col-6 col-lg-5 col-xl-4">
            <h2 th:text="#{product.description}">Descripción</h2>
            <p th:text="${product.getDescription(#locale.language)}"></p>
        </div>
    </div>

    <div class="row justify-content-center mt-4" style="background-color:#c5c5c5;">
        <div class="col-6 col-lg-5 col-xl-4 mt-5 mb-4">
            <h5 th:text="#{product.composition}">Composición:</h5>
            <div class="row g-1">
                <div class="col-4" th:each="img : ${product.composiciones}">
                    <img th:src="@{${img}}" class="img-fluid">
                </div>
            </div>
        </div>

        <div class="col-6 col-lg-5 col-xl-4 d-flex flex-column mt-5 mb-4 justify-content-center">
            <h5 class="text-end" th:text="#{product.detail}">Detalle:</h5>
            <div class="row g-1">
                <div class="d-flex justify-content-end">
                    <img th:src="@{${product.detail}}" class="img-fluid" style="height: 800px; object-fit: cover;" alt="Imagen del detalle">
                </div>
            </div>
        </div>
    </div>
</div>

<div th:replace="footer :: copy"></div>
<script src="/js/navbarCustom.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
